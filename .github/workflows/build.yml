name: SkidMenu Force-Repair & Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Surgical Code Repair
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $lines = Get-Content $path
          
          # 1. TRUNCATE THE GARBAGE
          # Find the last stable line and discard everything after it
          $lastValidIndex = 0
          for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -like "*GUILayout.EndScrollView()*" -or $lines[$i] -like "*GUI.DragWindow()*") {
                  $lastValidIndex = $i
              }
          }

          if ($lastValidIndex -gt 0) {
              Write-Host "Truncating broken code at line $($lastValidIndex + 1)"
              $lines = $lines[0..$lastValidIndex]
          }
          $content = $lines -join "`r`n"

          # 2. FIX UNITY/IL2CPP AMBIGUITY
          Write-Host "Fixing IL2CPP specific syntax errors..."
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'
          $content = $content -replace '== 7', '== (EventType)7'
          $content = $content -replace '== 0', '== (EventType)0'
          
          # Fix Byte Overflows in Color32
          $content = [regex]::Replace($content, 'new Color32\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+)\)', {
              param($m)
              "new Color32(unchecked((byte)$($m.Groups[1].Value.Trim())), unchecked((byte)$($m.Groups[2].Value.Trim())), unchecked((byte)$($m.Groups[3].Value.Trim())), unchecked((byte)$($m.Groups[4].Value.Trim())))"
          })

          # 3. MATHEMATICAL BRACE BALANCING
          $openBraces = ([regex]::Matches($content, "{")).Count
          $closeBraces = ([regex]::Matches($content, "}")).Count
          $needed = $openBraces - $closeBraces

          if ($needed -gt 0) {
              Write-Host "Closing $needed unclosed blocks..."
              for ($i = 0; $i -lt $needed; $i++) { $content += "`r`n}" }
          }

          Set-Content $path $content -Encoding UTF8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload DLL
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SkidMenu-Build
          path: bin/Release/SkidMenu.dll
