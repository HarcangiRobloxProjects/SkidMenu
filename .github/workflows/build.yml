name: Build SkidMenu

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auto-Fix Type Conversion Errors
      shell: pwsh
      run: |
        $files = Get-ChildItem -Recurse -Include *.cs
        foreach ($file in $files) {
            $content = Get-Content $file -Raw

            # 1. Fix Ambiguous GUILayout calls (Cast null to resolve method ambiguity)
            $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
            $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'

            # 2. Fix Byte conversion errors (e.g., Color32 and byte.MaxValue)
            $content = $content -replace 'byte\.MaxValue', '(byte)255'
            $content = $content -replace 'new Color32\((\d+),\s*(\d+),\s*(\d+),\s*(\d+)\)', 'new Color32((byte)$1, (byte)$2, (byte)$3, (byte)$4)'

            # 3. Fix Text Alignment (TextAnchor to TextAlignmentOptions)
            $content = $content -replace '\(TextAnchor\)4', 'TMPro.TextAlignmentOptions.Center'
            $content = $content -replace 'alignment = \(TextAnchor\)(\d+)', 'alignment = TMPro.TextAlignmentOptions.Center'

            # 4. Fix EventType comparisons (EventType to int)
            $content = $content -replace 'Event\.current\.type == 7', 'Event.current.type == EventType.Repaint'
            $content = $content -replace 'Event\.current\.type == 0', 'Event.current.type == EventType.MouseDown'
            
            # 5. Remove invalid null checks on Enums
            $content = $content -replace 'if \(Event\.current\.type != null\)', 'if (true)'

            Set-Content -Path $file -Value $content
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project
      run: msbuild SkidMenu.csproj /p:Configuration=Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Plugin
        path: bin/Release/SkidMenu.dll
