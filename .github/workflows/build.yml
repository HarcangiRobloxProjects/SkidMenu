name: Build SkidMenu

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auto-Fix Type Conversion Errors
      shell: pwsh
      run: |
        $files = Get-ChildItem -Recurse -Include *.cs
        foreach ($file in $files) {
            $content = Get-Content $file -Raw

            # 1. Fix Ambiguous GUILayout calls
            $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
            $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'

            # 2. Fix Text Alignment (Converting back to TextAnchor where requested by compiler)
            $content = $content -replace 'TMPro\.TextAlignmentOptions\.Center', 'UnityEngine.TextAnchor.MiddleCenter'
            $content = $content -replace 'TMPro\.TextAlignmentOptions\.Left', 'UnityEngine.TextAnchor.MiddleLeft'
            $content = $content -replace 'TMPro\.TextAlignmentOptions\.Right', 'UnityEngine.TextAnchor.MiddleRight'
            
            # 3. Fix Byte conversion for Color32 and small constants
            $content = $content -replace 'byte\.MaxValue', '(byte)255'
            $content = $content -replace 'new Color32\((\d+),\s*(\d+),\s*(\d+),\s*(\d+)\)', 'new Color32((byte)$1, (byte)$2, (byte)$3, (byte)$4)'

            # 4. Fix Constant overflow (CS0221) for values like 1912
            $content = $content -replace '(?<!unchecked\()\(byte\)(\d{4,})', 'unchecked((byte)$1)'
            $content = $content -replace '(?<!unchecked\()(\d{4,})m', 'unchecked((byte)$1)'

            # 5. Fix EventType comparisons
            $content = $content -replace 'Event\.current\.type == 7', 'Event.current.type == EventType.Repaint'
            $content = $content -replace 'Event\.current\.type == 0', 'Event.current.type == EventType.MouseDown'
            
            Set-Content -Path $file -Value $content
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project
      run: msbuild SkidMenu.csproj /p:Configuration=Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Plugin
        path: bin/Release/SkidMenu.dll
