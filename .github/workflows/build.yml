name: SkidMenu Total Seal & Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Aggressive Tail Repair
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $content = Get-Content $path -Raw
          
          # 1. REMOVE DECOMPILER TAIL
          # We find the last occurrence of a closed block followed by typical decompiler garbage
          # and truncate the file significantly to ensure we aren't mid-expression.
          if ($content -match "(?s)(.*GUILayout\.EndScrollView\(\);)") {
              Write-Host "Found stable UI end point. Truncating file tail..."
              $content = $matches[1]
          }
          
          # 2. INJECT MISSING HELPERS
          # The previous logs showed DrawSabotageButton was missing. We add it here.
          $helpers = @"
          public void DrawSabotageButton(string label, System.Action action) { 
              if (GUILayout.Button(label, (GUILayoutOption[])null)) action(); 
          }
          "@
          $content = $content -replace 'public class SkidMenu : MonoBehaviour\s*\{', "public class SkidMenu : MonoBehaviour { `r`n $helpers"

          # 3. FIX IL2CPP TYPES
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'
          $content = [regex]::Replace($content, 'new Color32\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+)\)', {
              param($m) "new Color32(unchecked((byte)$($m.Groups[1].Value.Trim())), unchecked((byte)$($m.Groups[2].Value.Trim())), unchecked((byte)$($m.Groups[3].Value.Trim())), unchecked((byte)$($m.Groups[4].Value.Trim())))"
          })

          # 4. MATHEMATICAL BRACE BALANCE
          # This counts { and } and adds exactly what is needed to close the file.
          $openBraces = ([regex]::Matches($content, "{")).Count
          $closeBraces = ([regex]::Matches($content, "}")).Count
          $needed = $openBraces - $closeBraces
          for ($i = 0; $i -lt $needed; $i++) { $content += "`r`n}" }

          Set-Content $path $content -Encoding UTF8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload DLL
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SkidMenu-Final
          path: bin/Release/SkidMenu.dll
