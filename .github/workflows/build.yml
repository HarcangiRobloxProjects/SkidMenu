name: SkidMenu Surgical Fixer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Surgical Code Repair
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $content = Get-Content $path -Raw
          Write-Host "Performing surgery on $path..."

          # 1. Fix the truncated 'isResizing' lines (CS1026)
          # This adds the missing ); that the decompiler forgot at the end of the line
          $content = $content -replace 'this\.isResizing = flag4', 'this.isResizing = flag4;'
          $content = $content -replace 'this\.isResizing = flag2', 'this.isResizing = flag2;'

          # 2. Fix the Ambiguous GUILayout calls (prevents the new errors)
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'

          # 3. Force-close the entire file structure (CS1513)
          # We trim everything and add a clean exit
          $content = $content.TrimEnd().TrimEnd('}')
          $content = $content.TrimEnd().TrimEnd('}')
          $content = $content.TrimEnd()
          $content += "`r`n            }`r`n        }`r`n    }`r`n}"

          Set-Content $path $content -Encoding UTF8
          Write-Host "Surgery complete."

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: SkidMenu-Final-Build
          path: bin/Release/SkidMenu.dll
