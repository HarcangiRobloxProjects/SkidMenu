name: SkidMenu Deep-Repair & Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Advanced Code Reconstruction
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $content = Get-Content $path -Raw
          
          # 1. INJECT MISSING MEMBERS
          # This inserts necessary fields into the SkidMenu class so the UI logic has variables to talk to.
          $missingMembers = @"
          public float _playerCacheTimer, tabTransitionProgress, cursorBlinkTime;
          public int targetTab, cursorPosition, searchCursorPosition, selectedSettingsMapId;
          public bool chatBoxFocused, showCursor, settingsBoxFocused, settingsLoaded, SpamChatEnabled, MonitorAndVotekickNewPlayers;
          public string chatMessage, searchQuery, settingInputBuffer, blacklistAddedMessage;
          public UnityEngine.Vector2 contentOffset, scrollPosition, hostKickPlayerScrollPosition, blacklistScrollPosition, destroyScrollPosition;
          public UnityEngine.Rect windowRect = new UnityEngine.Rect(20, 20, 300, 450);
          public void DrawToggleSwitch(string label, ref bool value) { value = GUILayout.Toggle(value, label); }
          public void DrawSabotageButton(string label, System.Action action) { if(GUILayout.Button(label)) action(); }
          public UnityEngine.Texture2D MakeTex(int w, int h, UnityEngine.Color col) { 
              var pix = new UnityEngine.Color[w * h]; for(int i=0; i<pix.Length;i++) pix[i]=col;
              var res = new UnityEngine.Texture2D(w,h); res.SetPixels(pix); res.Apply(); return res;
          }
          "@
          
          # Insert these at the start of the SkidMenu class
          $content = $content -replace 'public class SkidMenu : MonoBehaviour\s*\{', "public class SkidMenu : MonoBehaviour { `r`n $missingMembers"

          # 2. GLOBAL SYNTAX FIXES
          Write-Host "Fixing Unity Ambiguity and Type Errors..."
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'
          $content = $content -replace '== 7', '== (EventType)7'
          $content = $content -replace '== 0', '== (EventType)0'
          
          # Fix Byte Overflows (Color32 errors)
          $content = [regex]::Replace($content, 'new Color32\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+)\)', {
              param($m)
              "new Color32(unchecked((byte)$($m.Groups[1].Value.Trim())), unchecked((byte)$($m.Groups[2].Value.Trim())), unchecked((byte)$($m.Groups[3].Value.Trim())), unchecked((byte)$($m.Groups[4].Value.Trim())))"
          })

          # 3. FIX TEXT ALIGNMENT CASTS
          $content = $content -replace '\.alignment = (UnityEngine\.TextAnchor\.[a-zA-Z]+)', '.alignment = (TMPro.TextAlignmentOptions)$1'

          Set-Content $path $content -Encoding UTF8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"
