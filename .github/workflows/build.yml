name: Build SkidMenu

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auto-Fix IL2CPP Type Conflicts
      shell: pwsh
      run: |
        $files = Get-ChildItem -Recurse -Include *.cs
        foreach ($file in $files) {
            $content = Get-Content $file -Raw

            # 1. Add missing namespaces to HostCommandPatch
            if ($file.Name -eq "HostCommandPatch.cs" -and $content -notmatch "using Il2CppInterop.Runtime.InteropTypes.Arrays;") {
                $content = "using Il2CppInterop.Runtime.InteropTypes.Arrays;`r`n" + $content
            }

            # 2. Fix GUILayout Ambiguity (Force cast to GUILayoutOption array)
            # We use the full namespace to prevent CS0246 errors
            $content = $content -replace 'GUILayout\.BeginHorizontal\(', 'GUILayout.BeginHorizontal((Il2CppInterop.Runtime.InteropTypes.Arrays.Il2CppReferenceArray<GUILayoutOption>)null'
            $content = $content -replace 'GUILayout\.BeginVertical\(', 'GUILayout.BeginVertical((Il2CppInterop.Runtime.InteropTypes.Arrays.Il2CppReferenceArray<GUILayoutOption>)null'
            $content = $content -replace 'nullnull', 'null'

            # 3. Fix Color32 Byte Casting (Only for numbers 0-255)
            # This ignores large numbers like 1912 that were causing CS0221
            $content = $content -replace 'new Color32\((?!\d{3,})(\d+),\s*(?!\d{3,})(\d+),\s*(?!\d{3,})(\d+),\s*(?!\d{3,})(\d+)\)', 'new Color32((byte)$1, (byte)$2, (byte)$3, (byte)$4)'
            $content = $content -replace 'byte\.MaxValue', '(byte)255'

            # 4. Fix EventType comparison (CS0019)
            $content = $content -replace '== 7', '== EventType.Repaint'
            $content = $content -replace '== 0', '== EventType.MouseDown'
            
            # 5. Fix TMPro Alignment
            $content = $content -replace 'UnityEngine\.TextAnchor', 'TMPro.TextAlignmentOptions'

            Set-Content -Path $file -Value $content
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project
      run: msbuild SkidMenu.csproj /p:Configuration=Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Plugin
        path: bin/Release/SkidMenu.dll
