name: SkidMenu Final Fixer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clean and Repair Source Code
      shell: pwsh
      run: |
        $path = "SkidMenuPlugin.cs"
        $content = Get-Content $path -Raw
        
        # Remove all trailing closing braces and whitespace to start fresh
        Write-Host "Cleaning up excess braces..."
        $content = $content.TrimEnd().TrimEnd('}')
        $content = $content.TrimEnd().TrimEnd('}')
        $content = $content.TrimEnd().TrimEnd('}')
        $content = $content.TrimEnd().TrimEnd('}')

        # Re-add exactly four braces to close the logic, method, class, and namespace
        $content += "`r`n            }`r`n        }`r`n    }`r`n}"
        
        Set-Content $path $content
        Write-Host "File cleaned and closed properly."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project
      run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Build
        path: bin/Release/SkidMenu.dll
