name: SkidMenu Final Brace Alignment

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Final Syntax Repair
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $content = Get-Content $path -Raw
          
          Write-Host "Re-aligning braces for the final time..."

          # 1. Fix the truncated logic lines
          $content = $content -replace 'this\.isResizing = flag4', 'this.isResizing = flag4;'
          $content = $content -replace 'this\.isResizing = flag2', 'this.isResizing = flag2;'

          # 2. Fix the Ambiguous GUILayout calls
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'

          # 3. THE 4-BRACE SOLUTION
          # We shave off everything at the end and add exactly 4 braces.
          # 1: Close the truncated logic block/method
          # 2: Close the Method/Class member
          # 3: Close the Class
          # 4: Close the Namespace
          $content = $content.TrimEnd().TrimEnd('}').TrimEnd().TrimEnd('}').TrimEnd().TrimEnd('}').TrimEnd().TrimEnd('}')
          $content += "`r`n            }`r`n        }`r`n    }`r`n}"

          Set-Content $path $content -Encoding UTF8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

    # Only upload if the build actually succeeds this time!
      - name: Upload DLL
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SkidMenu-Built-DLL
          path: bin/Release/SkidMenu.dll
