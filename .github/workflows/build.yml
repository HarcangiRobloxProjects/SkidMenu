name: SkidMenu Deep-Repair & Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Advanced Code Reconstruction
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $content = Get-Content $path -Raw
          
          Write-Host "Injecting missing class members..."
          # This block re-defines everything the compiler says is 'missing'
          $missingMembers = @"
          // Fixed Fields
          public float _playerCacheTimer, tabTransitionProgress, cursorBlinkTime, lastChatSendTime;
          public int targetTab, cursorPosition, searchCursorPosition, selectedSettingsMapId, selectedWhisperTargetId;
          public bool chatBoxFocused, showCursor, settingsBoxFocused, settingsLoaded, SpamChatEnabled, MonitorAndVotekickNewPlayers;
          public string chatMessage, searchQuery, settingInputBuffer, blacklistAddedMessage, blacklistInput;
          public UnityEngine.Vector2 contentOffset, scrollPosition, hostKickPlayerScrollPosition, blacklistScrollPosition, destroyScrollPosition, sabotageScrollPosition;
          public UnityEngine.Rect windowRect = new UnityEngine.Rect(20, 20, 300, 450);
          public Il2CppSystem.Collections.Generic.List<PlayerControl> _cachedPlayers;
          
          // Fixed Methods
          public void DrawToggleSwitch(string label, ref bool value) { value = GUILayout.Toggle(value, label, (GUILayoutOption[])null); }
          public void DrawSabotageButton(string label, System.Action action) { if(GUILayout.Button(label, (GUILayoutOption[])null)) action(); }
          public void DrawSabotageButton(string label, System.Action action, string tooltip) { if(GUILayout.Button(new GUIContent(label, tooltip), (GUILayoutOption[])null)) action(); }
          public UnityEngine.Texture2D MakeTex(int w, int h, UnityEngine.Color col) { 
              var pix = new UnityEngine.Color[w * h]; for(int i=0; i<pix.Length;i++) pix[i]=col;
              var res = new UnityEngine.Texture2D(w,h); res.SetPixels(pix); res.Apply(); return res;
          }
          public class SearchResult { public string Name; public string Id; }
          "@
          
          # Inject members after the class declaration
          $content = $content -replace 'public class SkidMenu : MonoBehaviour\s*\{', "public class SkidMenu : MonoBehaviour { `r`n $missingMembers"

          Write-Host "Patching IL2CPP Type Mismatches..."
          # Fix GUILayout Ambiguity
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'
          
          # Fix EventType comparisons (int vs Enum)
          $content = $content -replace '== 7', '== (UnityEngine.EventType)7'
          $content = $content -replace '== 0', '== (UnityEngine.EventType)0'
          
          # Fix Color32 Byte Overflows (e.g., 1912 -> byte)
          $content = [regex]::Replace($content, 'new Color32\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+)\)', {
              param($m) "new Color32(unchecked((byte)$($m.Groups[1].Value.Trim())), unchecked((byte)$($m.Groups[2].Value.Trim())), unchecked((byte)$($m.Groups[3].Value.Trim())), unchecked((byte)$($m.Groups[4].Value.Trim())))"
          })

          # Fix Text Alignment casts
          $content = $content -replace '\.alignment = (UnityEngine\.TextAnchor\.[a-zA-Z]+)', '.alignment = (TMPro.TextAlignmentOptions)$1'

          # Final Brace Balance
          $openBraces = ([regex]::Matches($content, "{")).Count
          $closeBraces = ([regex]::Matches($content, "}")).Count
          $needed = $openBraces - $closeBraces
          if ($needed -gt 0) { for ($i = 0; $i -lt $needed; $i++) { $content += "`r`n}" } }

          Set-Content $path $content -Encoding UTF8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload DLL
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SkidMenu-Build
          path: bin/Release/SkidMenu.dll
