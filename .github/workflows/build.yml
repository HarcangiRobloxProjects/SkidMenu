name: SkidMenu Final Precision Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Precision Code Repair
        shell: pwsh
        run: |
          $path = "SkidMenuPlugin.cs"
          $content = Get-Content $path -Raw
          
          Write-Host "Repairing syntax and fixing brace count..."

          # 1. Fix the truncated logic lines
          $content = $content -replace 'this\.isResizing = flag4', 'this.isResizing = flag4;'
          $content = $content -replace 'this\.isResizing = flag2', 'this.isResizing = flag2;'

          # 2. Fix the Ambiguous GUILayout calls
          $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
          $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'

          # 3. THE BRACE FIX: Remove all trailing braces and whitespace, then add exactly THREE.
          # Most plugins have: Class { Method { CODE } } Namespace }
          # Since the decompiler cut off inside a method, we need 3 to close Method, Class, and Namespace.
          $content = $content.TrimEnd().TrimEnd('}').TrimEnd().TrimEnd('}').TrimEnd().TrimEnd('}').TrimEnd().TrimEnd('}')
          $content += "`r`n        }`r`n    }`r`n}"

          Set-Content $path $content -Encoding UTF8

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Project
        run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: SkidMenu-Standard-Build
          path: bin/Release/SkidMenu.dll
