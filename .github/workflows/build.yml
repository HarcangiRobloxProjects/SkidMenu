name: Build SkidMenu

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auto-Fix Decompiler Errors
      shell: pwsh
      run: |
        $file = "SkidMenuPlugin.cs"
        $content = Get-Content $file -Raw

        # 1. Fix the byte casting errors (e.g., Write((byte)1912) -> Write(unchecked((byte)1912)))
        $content = $content -replace 'Write\(\(byte\)(\d+)\)', 'Write(unchecked((byte)$1))'
        
        # 2. Fix the common missing parenthesis in GUILayout calls
        $content = $content -replace 'GUILayout\.BeginHorizontal\(\)', 'GUILayout.BeginHorizontal((GUILayoutOption[])null)'
        $content = $content -replace 'GUILayout\.BeginVertical\(\)', 'GUILayout.BeginVertical((GUILayoutOption[])null)'

        # 3. Fix EventType comparison (common IL2CPP error)
        $content = $content -replace '== 7', '== EventType.Repaint'
        
        Set-Content -Path $file -Value $content

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project
      run: msbuild SkidMenu.csproj /p:Configuration=Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Plugin
        path: bin/Release/SkidMenu.dll
