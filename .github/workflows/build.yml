name: Auto-Fix and Build SkidMenu

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Auto-Fix Syntax Errors
      shell: pwsh
      run: |
        $filePath = "SkidMenuPlugin.cs"
        $content = Get-Content $filePath -Raw
        
        # Fix for line 14836/14856: Identify unclosed resize logic and close it
        # This adds the 4 missing closing braces for the flag checks, the method, and the class
        if ($content -match "bool flag3 = this.isResizing;") {
            Write-Host "Detected unclosed resizing logic. Applying fix..."
            if ($content -notmatch "\}\s*\}\s*\}\s*\}\s*$") {
                $content = $content.TrimEnd() + "`r`n`t`t}`r`n`t}`r`n}`r`n}"
                Set-Content $filePath $content
                Write-Host "Syntax fix applied."
            }
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore SkidMenu.csproj

    - name: Build Project
      # Using /p:ContinueOnError=false to ensure we stop if the fix didn't work
      run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Fixed Plugin
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Fixed
        path: obj/Release/SkidMenu.dll
