name: SkidMenu Auto-Fixer Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Fix C# Syntax Errors
      shell: pwsh
      run: |
        $path = "SkidMenuPlugin.cs"
        if (Test-Path $path) {
            $content = Get-Content $path -Raw
            Write-Host "Analyzing $path for syntax errors..."

            # Fix 1: Close the truncated isResizing block (CS1026 & CS1513)
            # This looks for the last 'isResizing' check and ensures it's closed properly
            if ($content -match "this.isResizing") {
                Write-Host "Found unclosed logic. Adding missing braces..."
                # We trim trailing whitespace and append the missing closures
                $content = $content.TrimEnd()
                # Adds: } (if flag4) } (if flag3) } (Method) } (Class)
                $content += "`r`n            }`r`n        }`r`n    }`r`n}"
            }

            # Fix 2: Fix EventType casting errors (int vs Enum)
            # Some decompilers leave (EventType)7 or == 0 which causes errors
            $content = $content -replace '== \(EventType\)3', '== EventType.MouseUp'
            $content = $content -replace '== 7', '== EventType.Repaint'
            
            Set-Content $path $content
            Write-Host "Repair complete."
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore SkidMenu.csproj

    - name: Build Project
      # Your fixed CSPROJ now supports this exact string
      run: msbuild SkidMenu.csproj /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Repaired Plugin
      uses: actions/upload-artifact@v4
      with:
        name: SkidMenu-Fixed-DLL
        path: bin/Release/SkidMenu.dll
